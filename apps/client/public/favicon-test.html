<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Favicon Test</title>
  <style>
    body { font-family: sans-serif; padding: 40px; background: #f3f4f6; }
    h1 { color: #059669; }
    .preview { display: flex; gap: 40px; flex-wrap: wrap; align-items: flex-end; }
    .size { text-align: center; }
    .size span { display: block; margin-top: 8px; color: #6b7280; font-size: 13px; }
    .bg-white { background: white; padding: 12px; border-radius: 8px; display: inline-block; }
    .bg-dark { background: #1f2937; padding: 12px; border-radius: 8px; display: inline-block; }
  </style>
</head>
<body>
  <h1>תרופותי — New Favicon Preview</h1>
  
  <h3>Light Background</h3>
  <div class="preview">
    <div class="size">
      <div class="bg-white">
        <img src="/favicon.svg" width="64" height="64" alt="64px">
      </div>
      <span>64px</span>
    </div>
    <div class="size">
      <div class="bg-white">
        <img src="/favicon.svg" width="48" height="48" alt="48px">
      </div>
      <span>48px</span>
    </div>
    <div class="size">
      <div class="bg-white">
        <img src="/favicon.svg" width="32" height="32" alt="32px">
      </div>
      <span>32px (tab)</span>
    </div>
    <div class="size">
      <div class="bg-white">
        <img src="/favicon.svg" width="16" height="16" alt="16px">
      </div>
      <span>16px (tab)</span>
    </div>
  </div>

  <h3 style="margin-top: 40px;">Dark Background</h3>
  <div class="preview">
    <div class="size">
      <div class="bg-dark">
        <img src="/favicon.svg" width="64" height="64" alt="64px">
      </div>
      <span>64px</span>
    </div>
    <div class="size">
      <div class="bg-dark">
        <img src="/favicon.svg" width="48" height="48" alt="48px">
      </div>
      <span>48px</span>
    </div>
    <div class="size">
      <div class="bg-dark">
        <img src="/favicon.svg" width="32" height="32" alt="32px">
      </div>
      <span>32px</span>
    </div>
    <div class="size">
      <div class="bg-dark">
        <img src="/favicon.svg" width="16" height="16" alt="16px">
      </div>
      <span>16px</span>
    </div>
  </div>
</body>
</html>
